services:
  bot:
    build: .
    command: python -m adaptive_lang_study_bot.entrypoints.run_bot
    ports:
      - "9090:9090"
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 40G
    restart: unless-stopped

  admin:
    build: .
    command: python -m adaptive_lang_study_bot.entrypoints.run_admin
    ports:
      - "127.0.0.1:7860:7860"
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    command: >-
      postgres
      -c max_connections=500
      -c shared_buffers=1GB
      -c effective_cache_size=4GB
      -c work_mem=4MB
      -c maintenance_work_mem=128MB
      -c random_page_cost=1.1
      -c effective_io_concurrency=200
      -c wal_buffers=16MB
      -c checkpoint_completion_target=0.9
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: langbot
      POSTGRES_USER: langbot
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langbot"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 512mb --maxmemory-policy noeviction
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
